<!DOCTYPE html>
<html>
<head>
<title>Car Showroom</title>
<style>
body {font-family: Arial; margin:0; background:#f4f4f4;}
header {background:black; color:white; padding:15px; text-align:center;}
nav {background:#333; text-align:center;}
nav a {color:white; padding:14px; display:inline-block; text-decoration:none;}
nav a:hover {background:red;}
.container {padding:20px;}
.car {background:white; margin:15px; padding:15px; border-radius:10px;}
.price {color:red; font-weight:bold;}
</style>
</head>

<body>

<header>
<h1>🚗 My Car Showroom</h1>
<p>Welcome to best cars</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#cars">Cars</a>
</nav>

<div class="container">

<h2 id="cars">Available Cars</h2>

<div class="car">
<h3>Tesla Model S</h3>
<p>Electric car with autopilot</p>
<p class="price">$80,000</p>
</div>

<div class="car">
<h3>BMW M4</h3>
<p>Sports performance car</p>
<p class="price">$70,000</p>
</div>

<div class="car">
<h3>Audi R8</h3>
<p>Luxury supercar</p>
<p class="price">$150,000</p>
</div>

</div>

</body>
</html>
